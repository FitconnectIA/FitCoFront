# CI frontend FitConnect — vérification du code avant tout déploiement.
#
# Se déclenche sur chaque push et pull request vers main :
#   1. installation reproductible (npm ci)
#   2. lint (ESLint)
#   3. vérification des types (tsc --noEmit)
#   4. build de production Next.js (prérendu des 12 routes inclus)
#
# Secrets à configurer dans GitHub → Settings → Secrets and variables → Actions :
#   - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY  (clé publishable Clerk, requise par le build)
#   - CLERK_SECRET_KEY                   (clé secrète Clerk)
# Variable optionnelle (même écran, onglet "Variables") :
#   - NEXT_PUBLIC_API_URL                (URL de l'API backend ; défaut ci-dessous)

name: CI Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Types · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --legacy-peer-deps : @clerk/nextjs@7.5.7 exige react ~19.1.4 alors que
      # le projet épingle react 19.1.0 (même contrainte qu'en local).
      - name: Installation des dépendances
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        run: npm run lint

      - name: Vérification des types (tsc)
        run: npx tsc --noEmit

      - name: Build de production
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8000/v1' }}

      # OWASP A06 — scan des dépendances vulnérables (high/critical). Informatif ;
      # Dependabot ouvre les PR de mise à jour (voir .github/dependabot.yml).
      - name: Audit des dépendances (npm audit)
        continue-on-error: true
        run: npm audit --audit-level=high
